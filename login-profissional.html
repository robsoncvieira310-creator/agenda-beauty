<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Profissional - Agenda Beauty</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-header h2 {
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e1e5e8;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #5a67d8;
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border: 1px solid transparent;
        }
        
        .alert-error {
            background: #fee;
            border-color: #fcc;
            color: #c33;
        }
        
        .alert-success {
            background: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }
        
        .back-link {
            text-align: center;
            margin-top: 1rem;
        }
        
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        .password-setup {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        
        .password-setup h3 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h2>👩 Login Profissional</h2>
            <p>Área restrita para profissionais</p>
        </div>
        
        <div id="alertContainer"></div>
        
        <!-- Formulário de Login -->
        <form id="loginForm" onsubmit="return false;">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>
            
            <button type="submit" class="btn" id="btnLogin">
                Entrar
            </button>
        </form>
        
        <div class="back-link">
            <a href="index.html">← Voltar para o Início</a>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/dataManager.js"></script>
    
    <script>
        let currentEmail = '';
        
        console.log('🔐 LOGIN: Script de autenticação carregado');
        
        // Adicionar event listener para o formulário
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🔍 DEBUG: DOM carregado, configurando event listeners');
            
            const loginForm = document.getElementById('loginForm');
            const btnLogin = document.getElementById('btnLogin');
            
            console.log('🔍 DEBUG: Elementos encontrados:', {
                loginForm: !!loginForm,
                btnLogin: !!btnLogin
            });
            
            if (!loginForm || !btnLogin) {
                console.error('❌ DEBUG: Elementos não encontrados!');
                return;
            }
            
            // Event listener para submit do formulário
            loginForm.addEventListener('submit', function(e) {
                console.log('� LOGIN: Botão entrar clicado (submit)');
                e.preventDefault();
                handleLogin();
            });
            
            // Event listener para clique no botão (backup)
            btnLogin.addEventListener('click', function(e) {
                console.log('� LOGIN: Botão entrar clicado (click)');
                e.preventDefault();
                handleLogin();
            });
            
            console.log('🔍 DEBUG: Event listeners configurados com sucesso');
        });
        
        // Adicionar logs imediatos para verificar se a função existe
        console.log('🔍 DEBUG: Função handleLogin definida:', typeof handleLogin);
        
        async function handleLogin() {
            console.log('🔐 LOGIN: Início do handleLogin');
            
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const btnLogin = document.getElementById('btnLogin');
            
            console.log('� LOGIN: Email digitado:', email);
            console.log('� LOGIN: Senha digitada:', senha ? '[PRENCHIDA]' : '[VAZIA]');
            
            // Validar campos
            if (!email || !senha) {
                showAlert('Por favor, preencha email e senha', 'error');
                return;
            }
            
            btnLogin.disabled = true;
            btnLogin.textContent = 'Entrando...';
            
            try {
                console.log('� LOGIN: Autenticando com Supabase Auth...');
                
                // Usar apenas Supabase Auth
                const { data, error } = await window.supabase.auth.signInWithPassword({
                    email: email,
                    password: senha
                });
                
                console.log('🔐 LOGIN: Resultado Supabase Auth:', { data: !!data, error: !!error });
                
                if (error) {
                    console.log(' LOGIN: Erro na autenticação:', error);
                    
                    // Verificar se é erro de senha não definida (primeiro acesso)
                    if (error.message.includes('Invalid login credentials')) {
                        // Verificar se usuário existe mas não tem senha
                        try {
                            const { data: userData, error: userError } = await window.supabase.auth.admin.getUserByEmail(email);
                            
                            if (!userError && userData.user) {
                                console.log('🔐 LOGIN: Usuário encontrado mas sem senha - primeiro acesso');
                                showAlert('Este email foi convidado mas ainda não criou senha. Verifique seu email ou solicite um novo convite.', 'info');
                                
                                // Opcional: Redirecionar para reenviar convite
                                setTimeout(() => {
                                    if (confirm('Deseja receber um novo email de convite?')) {
                                        // TODO: Implementar reenvio de convite
                                        console.log('📧 TODO: Implementar reenvio de convite');
                                    }
                                }, 2000);
                                return;
                            }
                        } catch (adminError) {
                            console.error('❌ Erro ao verificar usuário:', adminError);
                        }
                    }
                    
                    showAlert('Email ou senha incorretos', 'error');
                    return;
                }
                
                console.log('🔐 LOGIN: Usuário autenticado:', data.user);
                
                // Buscar profissional relacionado
                console.log('🔐 LOGIN: Buscando profissional relacionado...');
                const { data: profissional, error: profError } = await window.supabase
                    .from('profissionais')
                    .select('*')
                    .eq('profile_id', data.user.id)
                    .single();
                
                if (profError) {
                    console.error('� LOGIN: Erro ao buscar profissional:', profError);
                    showAlert('Erro ao buscar dados do profissional', 'error');
                    return;
                }
                
                console.log('� LOGIN: Profissional encontrado:', profissional);
                
                // Salvar sessão
                localStorage.setItem('profissionalSession', JSON.stringify({
                    user: data.user,
                    profissional: profissional
                }));
                
                showAlert('Login realizado com sucesso!', 'success');
                
                // Redirecionar para agenda
                setTimeout(() => {
                    window.location.href = 'agenda.html';
                }, 1500);
                
            } catch (error) {
                console.error('� LOGIN: Erro no login:', error);
                showAlert('Erro ao fazer login. Tente novamente.', 'error');
            } finally {
                btnLogin.disabled = false;
                btnLogin.textContent = 'Entrar';
            }
        }
        
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    ${message}
                </div>
            `;
            
            // Remover alerta após 5 segundos
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 5000);
        }
        
        // Verificar se já existe sessão ao carregar a página
        window.addEventListener('load', () => {
            const session = localStorage.getItem('profissionalSession');
            if (session) {
                try {
                    const sessionData = JSON.parse(session);
                    if (sessionData.user && sessionData.profissional) {
                        // Redirecionar para agenda se já estiver logado
                        window.location.href = 'agenda.html';
                    }
                } catch (error) {
                    console.error('Erro ao verificar sessão:', error);
                    localStorage.removeItem('profissionalSession');
                }
            }
        });
        
        // Permitir Enter para fazer login
        document.getElementById('senha').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>
