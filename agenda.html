<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda - L'ange Beauty</title>
  
  <!-- FullCalendar -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css?v=20260319153000">
  <link rel="stylesheet" href="css/fullcalendar.min.css">
  <link rel="stylesheet" href="css/calendar-google-style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <h2>💇 Agenda Beauty</h2>
      <nav>
        <a href="index.html" class="nav-item">
          <span class="nav-icon">🏠</span>
          <span class="nav-text">Início</span>
        </a>
        <a href="agenda.html" class="nav-item active">
          <span class="nav-icon">📅</span>
          <span class="nav-text">Agenda</span>
        </a>
        <a href="clientes.html" class="nav-item">
          <span class="nav-icon">👥</span>
          <span class="nav-text">Clientes</span>
        </a>
        <a href="servicos.html" class="nav-item">
          <span class="nav-icon">💇</span>
          <span class="nav-text">Serviços</span>
        </a>
        <a href="profissionais.html" class="nav-item">
          <span class="nav-icon">👩</span>
          <span class="nav-text">Profissionais</span>
        </a>
      </nav>
      
      <!-- Botão de Logout -->
      <button id="logoutButton" class="btn btn-danger logout-btn">
        🚪 Sair
      </button>
    </aside>

    <main class="content">
      <div class="page-header">
        <h1>📅 Agenda - L'ange Beauty</h1>
        <div class="header-actions">
          <button id="btnHoje" class="btn btn-secondary">
            📅 Hoje
          </button>
          <button id="btnAtualizar" class="btn btn-primary">
            🔄 Atualizar
          </button>
        </div>
      </div>

      <!-- NOVA IMPLEMENTAÇÃO V1.2 - FILTROS DINÂMICOS -->
      <div class="filter-section">
        <h3> Filtros da Agenda</h3>
        
        <!-- Filtro por Profissional -->
        <div class="filter-group">
          <label for="filtroProfissional">Profissional:</label>
          <select id="filtroProfissional" class="filter-select">
            <option value="">Todos</option>
          </select>
        </div>

        <!-- Filtro por Serviço -->
        <div class="filter-group">
          <label for="filtroServico">Serviço:</label>
          <select id="filtroServico" class="filter-select">
            <option value="">Todos</option>
          </select>
        </div>

        <!-- Filtro por Cliente -->
        <div class="filter-group">
          <label for="filtroCliente">Cliente:</label>
          <input type="text" id="filtroCliente" class="filter-input" placeholder="Buscar cliente...">
        </div>

        <!-- Botão Limpar Filtros -->
        <div class="filter-actions">
          <button id="btnLimparFiltros" class="btn btn-secondary btn-sm">
            🗑️ Limpar Filtros
          </button>
        </div>
      </div>

      <div class="calendar-container">
        <div id="calendar"></div>
      </div>

      <!-- Estatísticas Rápidas -->
      <div class="stats-container">
        <div class="stat-card">
          <div class="stat-icon">📊</div>
          <div class="stat-content">
            <div class="stat-value" id="totalAgendamentos">0</div>
            <div class="stat-label">Agendamentos Hoje</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">✅</div>
          <div class="stat-content">
            <div class="stat-value" id="confirmadosHoje">0</div>
            <div class="stat-label">Confirmados</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⏰</div>
          <div class="stat-content">
            <div class="stat-value" id="proximosAgendamentos">0</div>
            <div class="stat-label">Próximos</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal de Agendamento/Bloqueio -->
  <div id="formAgendamento" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitulo">Novo Agendamento</h3>
        <button type="button" id="btnFecharModal" class="btn-close">&times;</button>
      </div>

      <div class="modal-body">
        <!-- Tipo de Registro -->
        <div class="form-group">
          <label for="tipoRegistro">Tipo:</label>
          <select id="tipoRegistro" class="form-control">
            <option value="agendamento">📅 Agendamento</option>
            <option value="bloqueio">🔒 Bloqueio</option>
          </select>
        </div>

        <!-- Campos de Agendamento -->
        <div id="camposAgendamento" class="form-section">
          <div class="form-row">
            <div class="form-group">
              <label for="cliente">Cliente *</label>
              <select id="cliente" class="form-control" required>
                <option value="">Selecione...</option>
              </select>
            </div>
            <div class="form-group">
              <label for="servico">Serviço *</label>
              <select id="servico" class="form-control" required>
                <option value="">Selecione...</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="profissional">Profissional *</label>
              <select id="profissional" class="form-control" required>
                <option value="">Selecione...</option>
              </select>
            </div>
            <div class="form-group">
              <label for="status">Status</label>
              <select id="status" class="form-control">
                <option value="agendado">📅 Agendado</option>
                <option value="confirmado">✅ Confirmado</option>
                <option value="em_andamento">⏳ Em Andamento</option>
                <option value="concluido">✔️ Concluído</option>
                <option value="cancelado">❌ Cancelado</option>
                <option value="nao_compareceu">⚠️ Não Compareceu</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="inicio">Início *</label>
              <input type="datetime-local" id="inicio" class="form-control" required>
            </div>
            <div class="form-group">
              <label for="fim">Fim *</label>
              <input type="datetime-local" id="fim" class="form-control" required>
            </div>
          </div>

          <div class="form-group">
            <label for="observacoes">Observações</label>
            <textarea id="observacoes" class="form-control" rows="3" placeholder="Observações sobre o agendamento..."></textarea>
          </div>
        </div>

        <!-- Campos de Bloqueio -->
        <div id="camposBloqueio" class="form-section" style="display: none;">
          <div class="form-group">
            <label for="tituloBloqueio">Título *</label>
            <input type="text" id="tituloBloqueio" class="form-control" required placeholder="Ex: Manutenção, Folga, etc.">
          </div>

          <div class="form-group">
            <label for="motivoBloqueio">Motivo</label>
            <textarea id="motivoBloqueio" class="form-control" rows="2" placeholder="Motivo do bloqueio..."></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="tipoBloqueio">Tipo *</label>
              <select id="tipoBloqueio" class="form-control" required>
                <option value="bloqueio"> Bloqueio</option>
                <option value="folga"> Folga</option>
                <option value="manutencao"> Manutenção</option>
                <option value="feriado"> Feriado</option>
              </select>
            </div>
            <div class="form-group">
              <label for="profissionalBloqueio">Profissional</label>
              <select id="profissionalBloqueio" class="form-control">
                <option value="">Todos os profissionais</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="inicioBloqueio">Início *</label>
              <input type="datetime-local" id="inicioBloqueio" class="form-control" required>
            </div>
            <div class="form-group">
              <label for="fimBloqueio">Fim *</label>
              <input type="datetime-local" id="fimBloqueio" class="form-control" required>
            </div>
          </div>

          <div class="form-group">
            <label for="observacoesBloqueio">Observações</label>
            <textarea id="observacoesBloqueio" class="form-control" rows="3" placeholder="Observações sobre o bloqueio..."></textarea>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" id="btnExcluir" class="btn btn-danger">
          <span class="btn-icon"> </span>
          <span class="btn-icon">🗑️</span>
          Excluir
        </button>
        <button type="button" id="btnSalvar" class="btn btn-primary">
          <span class="btn-icon">💾</span>
          Salvar
        </button>
      </div>
    </div>
  </div>

  <!-- Alert Container -->
  <div id="alertContainer" class="alert-container"></div>
  
  <!-- Notification Container -->
  <div id="notificationContainer"></div>
  
  <!-- Tooltip Container -->
  <div id="tooltipContainer" class="event-tooltip"></div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/authManager.js?v=20260319143200"></script>
  <script src="js/firstLoginManager.js"></script>
  <script src="js/dataManager.js?v=20260313210500"></script>
  <script src="js/modalManager.js?v=20260311142500"></script>
  <script src="js/calendarManager.js?v=20260313250000&t=1710255600000"></script>
  <script src="js/pageManager.js"></script>
  <script src="js/logoutManager.js?v=20260319160000"></script>
  <script src="js/sidebarManager.js?v=20260319153000"></script>
  <script src="js/agendaPage.js"></script>
  <script src="js/enhancements.js"></script>
  <script src="js/appInit.js"></script>
  
  <script>
    // INICIALIZAÇÃO NORMAL DA AGENDA
    setTimeout(() => {
      // Se DataManager já existe e tem dados, o evento já foi disparado
      if (window.dataManager && window.dataManager.agendamentos) {
        
        if (typeof FullCalendar === 'undefined') {
          document.getElementById('calendar').innerHTML = '<div style="padding: 20px; color: red;">FullCalendar não carregou. Verifique os arquivos JS.</div>';
          return;
        }
        
        try {
          window.pageManager = new AgendaPage();
          
          // Forçar inicialização manual
          if (window.pageManager.initializePage) {
            window.pageManager.initializePage();
          }
        } catch (error) {
          console.error('❌ Erro ao criar AgendaPage:', error);
        }
      } else {
        // Registrar listener para o evento
        window.addEventListener('appReady', async () => {
          
          if (typeof FullCalendar === 'undefined') {
            document.getElementById('calendar').innerHTML = '<div style="padding: 20px; color: red;">FullCalendar não carregou. Verifique os arquivos JS.</div>';
            return;
          }
          
          try {
            window.pageManager = new AgendaPage();
            
            // Forçar inicialização manual
            if (window.pageManager.initializePage) {
              await window.pageManager.initializePage();
            }
          } catch (error) {
            console.error('❌ Erro ao criar AgendaPage:', error);
          }
        });
      }
    }, 100);
  </script>
  
  <script>
    // ✅ VERIFICAR SESSÃO ANTES DE INICIAR PÁGINA
    setTimeout(async () => {
      console.log('🔍 AGENDA: Verificando sessão antes de inicializar...');
      
      // ✅ Usar AuthManager global protegido
      if (!window.authManager) {
        console.error('❌ AGENDA: AuthManager não encontrado');
        return;
      }
      
      // ✅ Verificar sessão atual
      const session = await window.authManager.getCurrentSession();
      if (!session) {
        console.error('❌ AGENDA: SEM SESSÃO - usuário não autenticado');
        window.location.href = 'login.html';
        return;
      }
      
      console.log('✅ AGENDA: Sessão verificada, usuário:', session.user.email);
      
      // ✅ Verificar se appReady já foi disparado
      if (window.dataManager && window.dataManager.agendamentos) {
        console.log('🚀 AGENDA: appReady já foi disparado, inicializando diretamente...');
        
        // GARANTIR QUE O LOGOUT MANAGER FUNCIONE EM AGENDA
        console.log('🔍 Verificando botão de logout em agenda...');
        const logoutBtn = document.getElementById('logoutButton');
        if (logoutBtn) {
          console.log('✅ Botão de logout encontrado, garantindo inicialização do LogoutManager...');
          console.log('🔍 DEBUG - Botão encontrado:', logoutBtn);
          console.log('🔍 DEBUG - Classes do botão:', logoutBtn.className);
          console.log('🔍 DEBUG - Parent do botão:', logoutBtn.parentElement);
          
          // Forçar criação do LogoutManager se não existir
          if (!window.logoutManager) {
            console.log('🔧 Criando LogoutManager manualmente em agenda...');
            window.logoutManager = new LogoutManager();
          }
          
          // Forçar visibilidade e posicionamento do botão
          logoutBtn.style.display = 'flex';
          logoutBtn.style.visibility = 'visible';
          logoutBtn.style.opacity = '1';
          logoutBtn.style.position = 'absolute';
          logoutBtn.style.bottom = '20px';
          logoutBtn.style.left = '20px';
          logoutBtn.style.right = '20px';
          logoutBtn.style.zIndex = '1000';
          console.log('🔧 Forçando visibilidade e posicionamento do botão em agenda...');
          
        } else {
          console.error('❌ Botão de logout não encontrado no HTML de agenda!');
        }
      } else {
        console.log('⏳ AGENDA: appReady ainda não foi disparado, registrando listener...');
        window.addEventListener('appReady', () => {
          console.log('🚀 AGENDA: appReady recebido, inicializando página...');
          
          // GARANTIR QUE O LOGOUT MANAGER FUNCIONE EM AGENDA
          console.log('🔍 Verificando botão de logout em agenda...');
          const logoutBtn = document.getElementById('logoutButton');
          if (logoutBtn) {
            console.log('✅ Botão de logout encontrado, garantindo inicialização do LogoutManager...');
            console.log('🔍 DEBUG - Botão encontrado:', logoutBtn);
            console.log('🔍 DEBUG - Classes do botão:', logoutBtn.className);
            console.log('🔍 DEBUG - Parent do botão:', logoutBtn.parentElement);
            
            // Forçar criação do LogoutManager se não existir
            if (!window.logoutManager) {
              console.log('🔧 Criando LogoutManager manualmente em agenda...');
              window.logoutManager = new LogoutManager();
            }
            
            // Forçar visibilidade e posicionamento do botão
            logoutBtn.style.display = 'flex';
            logoutBtn.style.visibility = 'visible';
            logoutBtn.style.opacity = '1';
            logoutBtn.style.position = 'absolute';
            logoutBtn.style.bottom = '20px';
            logoutBtn.style.left = '20px';
            logoutBtn.style.right = '20px';
            logoutBtn.style.zIndex = '1000';
            console.log('🔧 Forçando visibilidade e posicionamento do botão em agenda...');
            
          } else {
            console.error('❌ Botão de logout não encontrado no HTML de agenda!');
          }
        });
      }
      
      // LogoutManager cuidará do botão de logout automaticamente
      console.log('✅ Agenda: LogoutManager gerenciará o botão de logout');
    }, 200);
  </script>
</body>
</html>
