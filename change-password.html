<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alterar Senha - L'ange Beauty</title>
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Utils (para confirmDelete) -->
  <script src="js/utils.js"></script>
  
  <!-- Supabase Client -->
  <script src="js/supabaseClient.js"></script>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css?v=20260319153000">
  <style>
    .first-login-container {
      max-width: 400px;
      margin: 100px auto;
      padding: 40px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    .first-login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .first-login-header h1 {
      color: #D4AF37;
      font-size: 24px;
      margin-bottom: 10px;
    }
    
    .first-login-header p {
      color: #666;
      font-size: 14px;
    }
    
    .first-login-form .form-group {
      margin-bottom: 20px;
    }
    
    .first-login-form label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }
    
    .first-login-form input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    
    .first-login-form input:focus {
      outline: none;
      border-color: #D4AF37;
    }
    
    .first-login-form .btn-primary {
      width: 100%;
      padding: 14px;
      background: #D4AF37;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    .first-login-form .btn-primary:hover {
      background: #c4a030;
    }
    
    .first-login-form .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .btn-logout {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: #666;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 15px;
      transition: all 0.3s;
    }
    
    .btn-logout:hover {
      background: #f5f5f5;
      color: #333;
    }
    
    .password-requirements {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #666;
    }
    
    .password-requirements ul {
      margin: 8px 0 0 18px;
      padding: 0;
    }
    
    .password-requirements li {
      margin-bottom: 4px;
    }
    
    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    
    .alert-info {
      background: #e3f2fd;
      color: #1565c0;
      border: 1px solid #bbdefb;
    }
    
    .alert-error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ffcdd2;
    }
    
    .alert-success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="first-login-container">
    <div class="first-login-header">
      <h1>🔐 Alteração de Senha Obrigatória</h1>
      <p>Esta é a primeira vez que você acessa o sistema. Por segurança, defina uma nova senha.</p>
    </div>
    
    <div class="alert alert-info">
      <strong>Importante:</strong> A senha deve ter pelo menos 6 caracteres.
    </div>
    
    <div id="errorMessage" class="alert alert-error hidden"></div>
    <div id="successMessage" class="alert alert-success hidden"></div>
    
    <form class="first-login-form" id="changePasswordForm">
      <div class="form-group">
        <label for="currentPassword">Senha Atual (Temporária)</label>
        <input type="password" id="currentPassword" required placeholder="Digite a senha temporária">
      </div>
      
      <div class="form-group">
        <label for="newPassword">Nova Senha</label>
        <input type="password" id="newPassword" required minlength="6" placeholder="Mínimo 6 caracteres">
      </div>
      
      <div class="form-group">
        <label for="confirmPassword">Confirmar Nova Senha</label>
        <input type="password" id="confirmPassword" required minlength="6" placeholder="Digite novamente a nova senha">
      </div>
      
      <button type="submit" class="btn btn-primary" id="btnChangePassword">
        Alterar Senha e Continuar
      </button>
    </form>
    
    <button class="btn-logout" id="btnLogout">🚪 Sair do Sistema</button>
  </div>

  <script type="module">
    // ✅ supabaseClient já está disponível globalmente via window.supabaseClient
    // (carregado automaticamente pelo supabaseClient.js)
    const supabaseClient = window.supabaseClient;
    
    const form = document.getElementById('changePasswordForm');
    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');
    const btnChange = document.getElementById('btnChangePassword');
    
    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.classList.remove('hidden');
      successDiv.classList.add('hidden');
    }
    
    function showSuccess(msg) {
      successDiv.textContent = msg;
      successDiv.classList.remove('hidden');
      errorDiv.classList.add('hidden');
    }
    
    function clearMessages() {
      errorDiv.classList.add('hidden');
      successDiv.classList.add('hidden');
    }
    
    // 🎯 FASE 3: Handler de alteração de senha para primeiro login
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();
      
      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      // Validações básicas
      if (newPassword.length < 6) {
        showError('A nova senha deve ter pelo menos 6 caracteres.');
        return;
      }
      
      if (newPassword !== confirmPassword) {
        showError('As senhas não conferem. Digite a mesma senha nos dois campos.');
        return;
      }
      
      if (currentPassword === newPassword) {
        showError('A nova senha deve ser diferente da senha atual.');
        return;
      }
      
      btnChange.disabled = true;
      btnChange.textContent = 'Alterando...';
      
      try {
        // Obter sessão atual
        const { data: { session } } = await supabaseClient.auth.getSession();
        
        if (!session) {
          showError('Sessão inválida. Faça login novamente.');
          return;
        }
        
        // Chamar edge function específica para primeiro login
        const SUPABASE_URL = 'https://kckbcjjgbipcqzkynwpy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtja2JjampnaXBjcXpreW53cHkiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc3Mjc0MjEyOCwiZXhwIjoyMDg4MzE4MTI4fQ.h3Z8LkzH_PXxE-BBHPii3WUwfHQH5HESsvzHUHKY7ZE';

        const headers = {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${session.access_token}`,
          'Content-Type': 'application/json'
        };

        const url = `${SUPABASE_URL}/functions/v1/first-login-change-password`;
        const response = await fetch(url, {
          method: 'POST',
          headers,
          body: JSON.stringify({
            action: 'change',
            current_password: currentPassword,
            new_password: newPassword
          })
        });

        const data = await response.json();

        if (!response.ok) {
          if (data.error && data.error.includes('primeiro login já foi completado')) {
            // Redirecionar para index se já completou
            window.location.href = 'index.html';
            return;
          }
          showError('Erro ao alterar senha: ' + (data.error || 'Tente novamente.'));
          return;
        }

        if (data?.success) {
          showSuccess('Senha alterada com sucesso! Redirecionando...');
          
          // Disparar evento para FSM
          if (window.authFSM) {
            console.log('[CHANGE PASSWORD] Disparando PASSWORD_CHANGED para FSM...');
            window.authFSM.dispatch('PASSWORD_CHANGED');
          }
          
          // Redirecionar para index
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1500);
        } else {
          showError('Resposta inválida do servidor. Tente novamente.');
        }
        
      } catch (err) {
        console.error('[FIRST LOGIN CHANGE PASSWORD] Erro:', err);
        showError('Erro inesperado. Tente novamente.');
      } finally {
        btnChange.disabled = false;
        btnChange.textContent = 'Alterar Senha e Continuar';
      }
    });
    
    // 🎯 FASE 3: Logout funcional com confirmação
    document.getElementById('btnLogout').addEventListener('click', async () => {
      // 🎯 Usar modal de confirmação existente
      const confirmacao = await window.confirmDelete({
        title: 'Confirmar Logout',
        message: 'Deseja realmente sair do sistema?',
        itemName: '',
        confirmText: 'Sair',
        cancelText: 'Cancelar'
      });

      if (!confirmacao) {
        console.log('[CHANGE PASSWORD] Logout cancelado pelo usuário');
        return;
      }

      try {
        await supabaseClient.auth.signOut();
        window.location.href = 'login.html';
      } catch (err) {
        console.error('[CHANGE PASSWORD] Erro no logout:', err);
        window.location.href = 'login.html';
      }
    });
    
    // 🎯 FASE 3: Proteção - verificar estado e redirecionar se necessário
    async function checkAuthState() {
      try {
        const { data: { session } } = await supabaseClient.auth.getSession();

        if (!session) {
          // Não autenticado → login
          window.location.href = 'login.html';
          return;
        }

        // 🎯 Usar edge function para verificar first_login_completed
        const SUPABASE_URL = 'https://kckbcjjgbipcqzkynwpy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtja2JjampnaXBjcXpreW53cHkiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc3Mjc0MjEyOCwiZXhwIjoyMDg4MzE4MTI4fQ.h3Z8LkzH_PXxE-BBHPii3WUwfHQH5HESsvzHUHKY7ZE';

        const headers = {
          'apikey': SUPABASE_ANON_KEY,
          'Content-Type': 'application/json'
        };

        const url = `${SUPABASE_URL}/functions/v1/first-login-change-password`;
        const response = await fetch(url, {
          method: 'POST',
          headers,
          body: JSON.stringify({ action: 'check', userId: session.user.id })
        });

        const data = await response.json();

        if (!response.ok) {
          console.error('[CHANGE PASSWORD] Erro ao verificar first_login_completed:', response.status, data);
          return;
        }

        if (data.first_login_completed === true) {
          // Já completou → redirecionar para index
          window.location.href = 'index.html';
        }
        // Se first_login_completed === false, permanece na página (comportamento esperado)

      } catch (err) {
        console.error('[CHANGE PASSWORD] Erro ao verificar estado:', err);
      }
    }
    
    // Verificar estado ao carregar
    checkAuthState();
  </script>
</body>
</html>
