<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trocar Senha - Agenda Beauty</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .change-password-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #374151;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .btn-primary {
            width: 100%;
            padding: 0.75rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .btn-primary:hover {
            background: #2563eb;
        }
        
        .btn-primary:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        
        .alert {
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }
        
        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }
        
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
        
        .alert-info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #93c5fd;
        }
        
        .password-strength {
            margin-top: 0.5rem;
            font-size: 0.875rem;
        }
        
        .strength-weak { color: #dc2626; }
        .strength-medium { color: #d97706; }
        .strength-strong { color: #059669; }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="change-password-container">
        <h2>🔐 Trocar Senha</h2>
        <p style="margin-bottom: 1.5rem; color: #6b7280;">
            Esta é sua primeira vez acessando o sistema. Por favor, defina uma nova senha para continuar.
        </p>
        
        <div id="alertContainer"></div>
        
        <form id="changePasswordForm">
            <div class="form-group">
                <label for="currentPassword">Senha Atual (Temporária)</label>
                <input type="password" id="currentPassword" name="currentPassword" required>
            </div>
            
            <div class="form-group">
                <label for="newPassword">Nova Senha</label>
                <input type="password" id="newPassword" name="newPassword" required>
                <div id="passwordStrength" class="password-strength"></div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirmar Nova Senha</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </div>
            
            <button type="submit" id="btnChangePassword" class="btn-primary">
                <span id="btnText">Atualizar Senha</span>
            </button>
        </form>
    </div>

    <script src="js/supabaseClient.js"></script>
    <script>
        class ChangePasswordManager {
            constructor() {
                this.supabase = window.supabase;
                this.form = document.getElementById('changePasswordForm');
                this.alertContainer = document.getElementById('alertContainer');
                this.btnChangePassword = document.getElementById('btnChangePassword');
                this.btnText = document.getElementById('btnText');
                this.currentPasswordInput = document.getElementById('currentPassword');
                this.newPasswordInput = document.getElementById('newPassword');
                this.confirmPasswordInput = document.getElementById('confirmPassword');
                this.passwordStrengthDiv = document.getElementById('passwordStrength');
                
                this.init();
            }
            
            init() {
                // Verificar se usuário está logado
                this.checkAuthStatus();
                
                // Configurar eventos
                this.form.addEventListener('submit', (e) => this.handleSubmit(e));
                this.newPasswordInput.addEventListener('input', (e) => this.checkPasswordStrength(e.target.value));
                this.confirmPasswordInput.addEventListener('input', () => this.checkPasswordMatch());
            }
            
            async checkAuthStatus() {
                const { data: { session }, error } = await this.supabase.auth.getSession();
                
                if (error || !session) {
                    this.showAlert('Sessão não encontrada. Por favor, faça login novamente.', 'error');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                    return;
                }
                
                // Verificar se precisa trocar senha
                const { data: profile } = await this.supabase
                    .from('profiles')
                    .select('first_login_completed')
                    .eq('id', session.user.id)
                    .single();
                
                if (profile && profile.first_login_completed) {
                    this.showAlert('Sua senha já foi atualizada. Redirecionando...', 'info');
                    setTimeout(() => {
                        window.location.href = 'agenda.html';
                    }, 2000);
                    return;
                }
                
                console.log('✅ Usuário autenticado e precisa trocar senha');
            }
            
            async handleSubmit(e) {
                e.preventDefault();
                
                const currentPassword = this.currentPasswordInput.value;
                const newPassword = this.newPasswordInput.value;
                const confirmPassword = this.confirmPasswordInput.value;
                
                // Validações
                if (newPassword.length < 6) {
                    this.showAlert('A nova senha deve ter pelo menos 6 caracteres.', 'error');
                    return;
                }
                
                if (newPassword !== confirmPassword) {
                    this.showAlert('As senhas não coincidem.', 'error');
                    return;
                }
                
                if (currentPassword === newPassword) {
                    this.showAlert('A nova senha deve ser diferente da senha atual.', 'error');
                    return;
                }
                
                this.setLoading(true);
                
                try {
                    // Obter sessão atual
                    const { data: { session } } = await this.supabase.auth.getSession();
                    
                    if (!session) {
                        throw new Error('Sessão não encontrada');
                    }
                    
                    // Atualizar senha
                    const { error: updateError } = await this.supabase.auth.updateUser({
                        password: newPassword
                    });
                    
                    if (updateError) {
                        throw new Error(`Erro ao atualizar senha: ${updateError.message}`);
                    }
                    
                    // Atualizar profile para marcar primeiro login como completo
                    const { error: profileError } = await this.supabase
                        .from('profiles')
                        .update({ first_login_completed: true })
                        .eq('id', session.user.id);
                    
                    if (profileError) {
                        console.warn('⚠️ Erro ao atualizar profile:', profileError);
                    }
                    
                    this.showAlert('Senha atualizada com sucesso! Redirecionando...', 'success');
                    
                    // Fazer login novamente com nova senha
                    setTimeout(async () => {
                        const { error: signInError } = await this.supabase.auth.signInWithPassword({
                            email: session.user.email,
                            password: newPassword
                        });
                        
                        if (signInError) {
                            console.error('Erro ao fazer login:', signInError);
                            this.showAlert('Senha atualizada, mas erro ao fazer login. Tente fazer login manualmente.', 'error');
                            setTimeout(() => {
                                window.location.href = 'index.html';
                            }, 3000);
                        } else {
                            window.location.href = 'agenda.html';
                        }
                    }, 2000);
                    
                } catch (error) {
                    console.error('Erro ao trocar senha:', error);
                    this.showAlert(error.message, 'error');
                } finally {
                    this.setLoading(false);
                }
            }
            
            checkPasswordStrength(password) {
                let strength = 0;
                let message = '';
                let className = '';
                
                if (password.length >= 6) strength++;
                if (password.length >= 10) strength++;
                if (/[a-z]/.test(password)) strength++;
                if (/[A-Z]/.test(password)) strength++;
                if (/[0-9]/.test(password)) strength++;
                if (/[^a-zA-Z0-9]/.test(password)) strength++;
                
                if (strength <= 2) {
                    message = 'Senha fraca';
                    className = 'strength-weak';
                } else if (strength <= 4) {
                    message = 'Senha média';
                    className = 'strength-medium';
                } else {
                    message = 'Senha forte';
                    className = 'strength-strong';
                }
                
                this.passwordStrengthDiv.textContent = message;
                this.passwordStrengthDiv.className = `password-strength ${className}`;
            }
            
            checkPasswordMatch() {
                const newPassword = this.newPasswordInput.value;
                const confirmPassword = this.confirmPasswordInput.value;
                
                if (confirmPassword && newPassword !== confirmPassword) {
                    this.confirmPasswordInput.style.borderColor = '#dc2626';
                } else {
                    this.confirmPasswordInput.style.borderColor = confirmPassword ? '#059669' : '#e5e7eb';
                }
            }
            
            showAlert(message, type = 'info') {
                this.alertContainer.innerHTML = `
                    <div class="alert alert-${type}">
                        ${message}
                    </div>
                `;
                
                // Auto-remover após 5 segundos
                setTimeout(() => {
                    this.alertContainer.innerHTML = '';
                }, 5000);
            }
            
            setLoading(loading) {
                if (loading) {
                    this.btnChangePassword.disabled = true;
                    this.btnText.innerHTML = '<span class="loading"></span>Atualizando...';
                } else {
                    this.btnChangePassword.disabled = false;
                    this.btnText.textContent = 'Atualizar Senha';
                }
            }
        }
        
        // Inicializar quando o DOM estiver pronto
        document.addEventListener('DOMContentLoaded', () => {
            new ChangePasswordManager();
        });
    </script>
</body>
</html>
