<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alterar Senha - L'ange Beauty</title>
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Utils (para confirmDelete) -->
  <script src="js/utils.js"></script>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css?v=20260319153000">
  <style>
    .first-login-container {
      max-width: 400px;
      margin: 100px auto;
      padding: 40px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    .first-login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .first-login-header h1 {
      color: #D4AF37;
      font-size: 24px;
      margin-bottom: 10px;
    }
    
    .first-login-header p {
      color: #666;
      font-size: 14px;
    }
    
    .first-login-form .form-group {
      margin-bottom: 20px;
    }
    
    .first-login-form label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }
    
    .first-login-form input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    
    .first-login-form input:focus {
      outline: none;
      border-color: #D4AF37;
    }
    
    .first-login-form .btn-primary {
      width: 100%;
      padding: 14px;
      background: #D4AF37;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    .first-login-form .btn-primary:hover {
      background: #c4a030;
    }
    
    .first-login-form .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .btn-logout {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: #666;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 15px;
      transition: all 0.3s;
    }
    
    .btn-logout:hover {
      background: #f5f5f5;
      color: #333;
    }
    
    .password-requirements {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #666;
    }
    
    .password-requirements ul {
      margin: 8px 0 0 18px;
      padding: 0;
    }
    
    .password-requirements li {
      margin-bottom: 4px;
    }
    
    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    
    .alert-info {
      background: #e3f2fd;
      color: #1565c0;
      border: 1px solid #bbdefb;
    }
    
    .alert-error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ffcdd2;
    }
    
    .alert-success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="first-login-container">
    <div class="first-login-header">
      <h1>🔐 Alteração de Senha Obrigatória</h1>
      <p>Esta é a primeira vez que você acessa o sistema. Por segurança, defina uma nova senha.</p>
    </div>
    
    <div class="alert alert-info">
      <strong>Importante:</strong> A senha deve ter pelo menos 6 caracteres.
    </div>
    
    <div id="errorMessage" class="alert alert-error hidden"></div>
    <div id="successMessage" class="alert alert-success hidden"></div>
    
    <form class="first-login-form" id="changePasswordForm">
      <div class="form-group">
        <label for="currentPassword">Senha Atual (Temporária)</label>
        <input type="password" id="currentPassword" required placeholder="Digite a senha temporária">
      </div>
      
      <div class="form-group">
        <label for="newPassword">Nova Senha</label>
        <input type="password" id="newPassword" required minlength="6" placeholder="Mínimo 6 caracteres">
      </div>
      
      <div class="form-group">
        <label for="confirmPassword">Confirmar Nova Senha</label>
        <input type="password" id="confirmPassword" required minlength="6" placeholder="Digite novamente a nova senha">
      </div>
      
      <button type="submit" class="btn btn-primary" id="btnChangePassword">
        Alterar Senha e Continuar
      </button>
    </form>
    
    <button class="btn-logout" id="btnLogout">🚪 Sair do Sistema</button>
  </div>

  <script type="module">
    import { supabaseClient } from './js/supabaseClient.js';
    
    // Expor globalmente para debugging
    window.supabaseClient = supabaseClient;
    
    const form = document.getElementById('changePasswordForm');
    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');
    const btnChange = document.getElementById('btnChangePassword');
    
    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.classList.remove('hidden');
      successDiv.classList.add('hidden');
    }
    
    function showSuccess(msg) {
      successDiv.textContent = msg;
      successDiv.classList.remove('hidden');
      errorDiv.classList.add('hidden');
    }
    
    function clearMessages() {
      errorDiv.classList.add('hidden');
      successDiv.classList.add('hidden');
    }
    
    // 🎯 FASE 3: Handler de alteração de senha
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();
      
      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      // Validações básicas
      if (newPassword.length < 6) {
        showError('A nova senha deve ter pelo menos 6 caracteres.');
        return;
      }
      
      if (newPassword !== confirmPassword) {
        showError('As senhas não conferem. Digite a mesma senha nos dois campos.');
        return;
      }
      
      if (currentPassword === newPassword) {
        showError('A nova senha deve ser diferente da senha atual.');
        return;
      }
      
      btnChange.disabled = true;
      btnChange.textContent = 'Alterando...';
      
      try {
        // 🎯 CORREÇÃO: Obter usuário atual (já autenticado)
        const { data: { user } } = await supabaseClient.auth.getUser();
        
        if (!user) {
          showError('Sessão inválida. Faça login novamente.');
          return;
        }
        
        // 1. Alterar senha (não precisa verificar senha atual - sessão já válida)
        const { error: updateError } = await supabaseClient.auth.updateUser({
          password: newPassword
        });
        
        if (updateError) {
          showError('Erro ao alterar senha: ' + updateError.message);
          return;
        }
        
        // 2. Atualizar profile.first_login_completed
        const { error: profileError } = await supabaseClient
          .from('profiles')
          .update({ first_login_completed: true })
          .eq('id', user.id);
        
        if (profileError) {
          showError('Senha alterada, mas houve erro ao atualizar status. Contate o suporte.');
          console.error('[CHANGE PASSWORD] Erro ao atualizar profile:', profileError);
          return;
        }
        
        // 🎯 FASE 2: Disparar evento PASSWORD_CHANGED para transição FSM
        if (window.authFSM) {
          console.log('[CHANGE PASSWORD] Disparando PASSWORD_CHANGED para FSM...');
          window.authFSM.dispatch('PASSWORD_CHANGED');
        }
        
        showSuccess('Senha alterada com sucesso! Redirecionando...');
        
        // 3. Redirecionar para index após sucesso
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);
        
      } catch (err) {
        console.error('[CHANGE PASSWORD] Erro:', err);
        showError('Erro inesperado. Tente novamente ou contate o suporte.');
      } finally {
        btnChange.disabled = false;
        btnChange.textContent = 'Alterar Senha e Continuar';
      }
    });
    
    // 🎯 FASE 3: Logout funcional com confirmação
    document.getElementById('btnLogout').addEventListener('click', async () => {
      // 🎯 Usar modal de confirmação existente
      const confirmacao = await window.confirmDelete({
        title: 'Confirmar Logout',
        message: 'Deseja realmente sair do sistema?',
        itemName: '',
        confirmText: 'Sair',
        cancelText: 'Cancelar'
      });

      if (!confirmacao) {
        console.log('[CHANGE PASSWORD] Logout cancelado pelo usuário');
        return;
      }

      try {
        await supabaseClient.auth.signOut();
        window.location.href = 'login.html';
      } catch (err) {
        console.error('[CHANGE PASSWORD] Erro no logout:', err);
        window.location.href = 'login.html';
      }
    });
    
    // 🎯 FASE 3: Proteção - verificar estado e redirecionar se necessário
    async function checkAuthState() {
      try {
        const { data: { session } } = await supabaseClient.auth.getSession();
        
        if (!session) {
          // Não autenticado → login
          window.location.href = 'login.html';
          return;
        }
        
        // Verificar se já completou primeiro login
        const { data: profile } = await supabaseClient
          .from('profiles')
          .select('first_login_completed')
          .eq('id', session.user.id)
          .single();
        
        if (profile?.first_login_completed === true) {
          // Já completou → redirecionar para index
          window.location.href = 'index.html';
        }
        // Se first_login_completed === false, permanece na página (comportamento esperado)
        
      } catch (err) {
        console.error('[CHANGE PASSWORD] Erro ao verificar estado:', err);
      }
    }
    
    // Verificar estado ao carregar
    checkAuthState();
  </script>
</body>
</html>
