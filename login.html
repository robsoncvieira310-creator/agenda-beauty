<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Agenda Beauty</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    /* Estilos específicos da página de login */
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-gold) 0%, var(--primary-dark) 100%);
      padding: 20px;
    }
    
    .login-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    
    .login-logo {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: var(--primary-gold);
    }
    
    .login-title {
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 30px;
    }
    
    .login-subtitle {
      color: var(--text-light);
      margin-bottom: 40px;
      font-size: 1rem;
    }
    
    .login-form {
      text-align: left;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text-dark);
    }
    
    .form-control {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }
    
    .form-control:focus {
      outline: none;
      border-color: var(--primary-gold);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }
    
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--primary-gold);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .btn-login:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
    }
    
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .btn-login.loading {
      color: transparent;
    }
    
    .btn-login.loading::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      margin: -10px 0 0 -10px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .login-error {
      background: #fee2e2;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px solid #fecaca;
      font-size: 0.9rem;
    }
    
    .login-success {
      background: #dcfce7;
      color: #16a34a;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px solid #bbf7d0;
      font-size: 0.9rem;
    }
    
    .login-footer {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
      color: var(--text-light);
      font-size: 0.9rem;
    }
    
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(2px);
    }
    
    .loading-content {
      text-align: center;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(212, 175, 55, 0.3);
      border-radius: 50%;
      border-top-color: var(--primary-gold);
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 20px;
    }
    
    .loading-text {
      color: var(--text-dark);
      font-size: 1.1rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">💇</div>
      <h1 class="login-title">Agenda Beauty</h1>
      <p class="login-subtitle">Sistema de Agendamento Profissional</p>
      
      <div id="alertContainer"></div>
      
      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            class="form-control" 
            placeholder="seu@email.com" 
            required
            autocomplete="email"
          >
        </div>
        
        <div class="form-group">
          <label for="password">Senha</label>
          <input 
            type="password" 
            id="password" 
            class="form-control" 
            placeholder="Digite sua senha" 
            required
            autocomplete="current-password"
          >
        </div>
        
        <button type="submit" id="btnLogin" class="btn-login">
          <span id="btnText">Entrar</span>
        </button>
      </form>
      
      <div class="login-footer">
        <p>Agenda Beauty V2.0 - Sistema Profissional</p>
        <p><a href="login-profissional.html" style="color: var(--primary-gold); text-decoration: none;">👩 Login de Profissional</a></p>
      </div>
    </div>
  </div>
  
  <!-- Supabase CDN (global) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- ========================================= -->
  <!-- DEPENDÊNCIAS CRÍTICAS - ORDEM FIXA OBRIGATÓRIA -->
  <!-- ========================================= -->

  <!-- 1. Infraestrutura Core (sem dependências) -->
  <script src="js/supabaseClient.js?v=20260319180000"></script>
  <script src="js/fsm/trace.js"></script>
  
  <!-- ✅ FASE 1: EventLedger - Sistema central de registro de eventos -->
  <script src="js/core/event-ledger.js"></script>
  
  <script src="js/fsm/session-bus.js"></script>
  <script src="js/fsm/effect-runner.js?v=20260319190000"></script>
  <script src="js/fsm/auth-fsm.js?v=20260319161000"></script>

  <!-- 2. Auth Bootstrap (DEVE vir antes de Data/Services) -->
  <script src="js/auth/index.js"></script>
  <script src="js/auth-store.js"></script>
  <script src="js/bootstrap-auth.js"></script>

  <!-- 3. Data (depende de Auth estabilizado) -->
  <script src="js/data/core/DataCore.js"></script>

  <!-- 4. Utils -->
  <script src="js/utils.js"></script>

  <!-- 5. Services (dependem de DataCore) -->
  <script src="js/services/BaseService.js"></script>
  <script src="js/services/ClienteService.js"></script>
  <script src="js/services/ServicoService.js"></script>
  <script src="js/services/ProfissionalService.js"></script>
  <script src="js/services/EmpresaService.js"></script>
  <script src="js/services/BloqueioService.js"></script>
  <script src="js/services/AgendamentoService.js"></script>

  <!-- 5.4. Boot Tracer (observability - DEVE vir primeiro) -->
  <script src="js/core/boot-tracer.js"></script>

  <!-- 5.5. Boot Kernel (fonte única de controle de execução - DEVE vir antes de CompositionRoot) -->
  <script src="js/core/boot-kernel.js"></script>

  <!-- 🔴 GARANTIA DE ORDEM DE EXECUÇÃO: Kernel deve estar inicializado antes de qualquer consumidor -->
  <script>
    console.assert(window.__BOOT_KERNEL__, "[KERNEL][FATAL] Kernel not initialized before consumers");
    console.assert(window.__KERNEL__, "[KERNEL][FATAL] __KERNEL__ alias not set");
    console.assert(window.kernel, "[KERNEL][FATAL] kernel alias not set");
    console.assert(
      window.__BOOT_KERNEL__ === window.__KERNEL__ && window.__KERNEL__ === window.kernel,
      "[KERNEL][FATAL] Kernel aliases are not consistent"
    );
    console.log("[KERNEL ORDER CHECK] Kernel initialized before consumers: OK", {
      __BOOT_KERNEL__: !!window.__BOOT_KERNEL__,
      __KERNEL__: !!window.__KERNEL__,
      kernel: !!window.kernel,
      allRefsMatch: window.__BOOT_KERNEL__ === window.__KERNEL__ && window.__KERNEL__ === window.kernel
    });
  </script>

  <!-- 5.6. State Hydrator (unificação de estado - DEVE vir antes de CompositionRoot) -->
  <script src="js/core/state-hydrator.js"></script>

  <!-- 5.7. Boot Anomaly Detector (diagnóstico - non-blocking) -->
  <script src="js/core/boot-anomaly-detector.js"></script>

  <!-- 5.8. Boot Recovery Manager (resiliência - non-blocking) -->
  <script src="js/core/boot-recovery-manager.js"></script>

  <!-- 5.9. Navigation Effect Runner (navegação FSM-driven - DEVE vir antes de CompositionRoot) -->
  <script src="js/core/navigation-effect-runner.js"></script>

  <!-- 🎯 FASE 3.0.1.1: Lifecycle Contract (DEVE vir antes dos Managers) -->
  <script src="js/core/lifecycle-contract.js"></script>

  <!-- 🎯 FASE 3.0.1.1: SidebarManager (passivo - carregado antes do CompositionRoot) -->
  <script src="js/sidebarManager.js"></script>

  <!-- 6. Composition Root (orquestra tudo) -->
  <script src="js/composition-root.js"></script>

  <!-- 🔴 AUTO-BOOTSTRAP: Iniciar boot automaticamente após carregar composition-root -->
  <script>
    (function autoBootstrap() {
      console.log('[AUTO-BOOTSTRAP] Verificando condições para iniciar...');

      // Verificar se bootstrapApp está disponível
      if (typeof window.bootstrapApp !== 'function') {
        console.error('[AUTO-BOOTSTRAP] bootstrapApp não disponível');
        return;
      }

      const kernel = window.__BOOT_KERNEL__ || window.__KERNEL__ || window.kernel;
      if (!kernel) {
        console.error('[AUTO-BOOTSTRAP] Kernel não disponível');
        return;
      }

      // Verificar se já está rodando ou pronto
      if (kernel.isRunning()) {
        console.log('[AUTO-BOOTSTRAP] Kernel já está rodando, skip');
        return;
      }

      if (kernel.isReady()) {
        console.log('[AUTO-BOOTSTRAP] Kernel já está pronto, skip');
        return;
      }

      // Iniciar bootstrap!
      console.log('[AUTO-BOOTSTRAP] Iniciando bootstrap...');
      window.bootstrapApp().then(context => {
        console.log('[AUTO-BOOTSTRAP] Bootstrap completado com sucesso', {
          hasContext: !!context,
          isReady: context?.isReady?.()
        });
      }).catch(err => {
        console.error('[AUTO-BOOTSTRAP] Bootstrap falhou:', err.message);
      });
    })();
  </script>

  <!-- 7. Login UI -->
  <script src="js/ui/login/LoginView.js?v=20260319162000"></script>

  <!-- 8. Inicialização do Login -->
  <script>
    // 🔴 STATE-DRIVEN BOOT: Função determinística de espera (SEM polling infinito)
    function waitForKernelReady(kernel, maxWaitMs = 5000) {
      return new Promise((resolve, reject) => {
        // Verificação imediata - kernel já READY?
        if (kernel.state === 'READY' || kernel.readyState?.isReady) {
          console.log('[waitForKernelReady] Kernel já READY (immediate)');
          return resolve(kernel);
        }

        const startTime = Date.now();
        const checkInterval = 10; // ms

        const check = setInterval(() => {
          // Verificar timeout
          if (Date.now() - startTime > maxWaitMs) {
            clearInterval(check);
            reject(new Error(`[waitForKernelReady] Timeout após ${maxWaitMs}ms`));
            return;
          }

          // Verificar READY state
          if (kernel.state === 'READY' || kernel.readyState?.isReady) {
            clearInterval(check);
            console.log('[waitForKernelReady] Kernel READY detectado');
            resolve(kernel);
          }
        }, checkInterval);
      });
    }

    document.addEventListener('DOMContentLoaded', async () => {
      console.log('[LOGIN INIT] DOMContentLoaded - inicializando...');

      // � STATE-DRIVEN: Leitura síncrona direta do kernel
      const kernel =
        window.__BOOT_KERNEL__ ||
        window.__KERNEL__ ||
        window.kernel;

      if (!kernel) {
        throw new Error('[FATAL] Kernel not available');
      }

      console.log('[LOGIN INIT] Kernel resolvido:', {
        state: kernel.state,
        isReady: kernel.isReady?.(),
        readyState: kernel.readyState?.isReady
      });

      // 🔴 STATE-DRIVEN: Verificar READY ou aguardar determinístico
      if (kernel.state !== 'READY' && !kernel.readyState?.isReady) {
        console.warn('[LOGIN] Kernel not ready yet - aguardando...');
        try {
          await waitForKernelReady(kernel, 5000);
        } catch (err) {
          console.error('[LOGIN] Falha aguardando kernel:', err.message);
          return;
        }
      }

      // 🔴 STATE-DRIVEN: Obter contexto DIRETO do kernel (sem callback)
      const context = kernel.getReadyContext?.();

      if (!context) {
        console.error('[LOGIN] Contexto não disponível mesmo com kernel READY');
        return;
      }

      console.log('[LOGIN INIT] Contexto obtido via leitura direta:', {
        hasContext: !!context,
        hasAuthFSM: !!context.authFSM,
        hasGetState: !!context.getAuthState,
        isReady: context.isReady?.()
      });

      const { authFSM, getAuthState } = context;

      if (!authFSM) {
        console.error('[LOGIN] authFSM não disponível no contexto');
        return;
      }

      // Criar adaptador para LoginView - repassa FSM sem interpretação
      const authAdapter = {
        getDerivedState: () => {
          const state = getAuthState?.() || authFSM.getState?.();
          return {
            isAuthenticated: state?.state === 'AUTHENTICATED',
            isLoading: false,
            hasError: !!state?.error,
            error: state?.error?.message
          };
        },
        subscribe: (fn) => {
          return authFSM.subscribe?.(fn) || (() => {});
        }
      };

      // Inicializar LoginView
      window.loginView = new LoginView(authFSM, authAdapter);
      console.log('[LOGIN INIT] LoginView criado com sucesso! (state-driven)');
      
      // 🎯 VERIFICAR SE SESSÃO EXPIROU (redirecionado do DataCore)
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('error') === 'session_expired') {
        const alertContainer = document.getElementById('alertContainer');
        if (alertContainer) {
          alertContainer.innerHTML = `
            <div class="login-error">
              ⚠️ Sua sessão expirou. Por favor, faça login novamente.
            </div>
          `;
        }
        // Limpar URL parameter
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    });
  </script>

  <!-- NOTA: main.js removido - login.html controla seu próprio bootstrap -->
</body>
</html>
