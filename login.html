<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Agenda Beauty</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    /* Estilos específicos da página de login */
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-gold) 0%, var(--primary-dark) 100%);
      padding: 20px;
    }
    
    .login-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    
    .login-logo {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: var(--primary-gold);
    }
    
    .login-title {
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 30px;
    }
    
    .login-subtitle {
      color: var(--text-light);
      margin-bottom: 40px;
      font-size: 1rem;
    }
    
    .login-form {
      text-align: left;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text-dark);
    }
    
    .form-control {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }
    
    .form-control:focus {
      outline: none;
      border-color: var(--primary-gold);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }
    
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--primary-gold);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .btn-login:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
    }
    
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .btn-login.loading {
      color: transparent;
    }
    
    .btn-login.loading::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      margin: -10px 0 0 -10px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .login-error {
      background: #fee2e2;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px solid #fecaca;
      font-size: 0.9rem;
    }
    
    .login-success {
      background: #dcfce7;
      color: #16a34a;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px solid #bbf7d0;
      font-size: 0.9rem;
    }
    
    .login-footer {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
      color: var(--text-light);
      font-size: 0.9rem;
    }
    
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(2px);
    }
    
    .loading-content {
      text-align: center;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(212, 175, 55, 0.3);
      border-radius: 50%;
      border-top-color: var(--primary-gold);
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 20px;
    }
    
    .loading-text {
      color: var(--text-dark);
      font-size: 1.1rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">💇</div>
      <h1 class="login-title">Agenda Beauty</h1>
      <p class="login-subtitle">Sistema de Agendamento Profissional</p>
      
      <div id="alertContainer"></div>
      
      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            class="form-control" 
            placeholder="seu@email.com" 
            required
            autocomplete="email"
          >
        </div>
        
        <div class="form-group">
          <label for="password">Senha</label>
          <input 
            type="password" 
            id="password" 
            class="form-control" 
            placeholder="Digite sua senha" 
            required
            autocomplete="current-password"
          >
        </div>
        
        <button type="submit" id="btnLogin" class="btn-login">
          <span id="btnText">Entrar</span>
        </button>
      </form>
      
      <div class="login-footer">
        <p>Agenda Beauty V1.3 - Sistema Profissional</p>
        <p><a href="login-profissional.html" style="color: var(--primary-gold); text-decoration: none;">👩 Login de Profissional</a></p>
      </div>
    </div>
  </div>
  
  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/authManager.js?v=20260319143200"></script>
  <script src="js/firstLoginManager.js"></script>
  <script src="js/dataManager.js"></script>
  <script src="js/pageManager.js"></script>
  <script src="js/menuManager.js"></script>
  <script src="js/appInit.js"></script>
  
  <script>
    // TESTE DE DIAGNÓSTICO - Verificar se Supabase está disponível
    console.log("🔍 LOGIN: SUPABASE CLIENT:", window.supabase);
    
    if (!window.supabase) {
      console.error("❌ LOGIN: Supabase client não encontrado!");
      alert("Erro: Supabase não está disponível. Verifique o console.");
    } else {
      console.log("✅ LOGIN: Supabase client disponível");
    }
    
    // Classe LoginManager para gerenciar a página de login
    class LoginManager {
      constructor() {
        this.form = document.getElementById('loginForm');
        this.emailInput = document.getElementById('email');
        this.passwordInput = document.getElementById('password');
        this.btnLogin = document.getElementById('btnLogin');
        this.btnText = document.getElementById('btnText');
        this.alertContainer = document.getElementById('alertContainer');
        
        this.initializeEventListeners();
        this.checkExistingSession();
      }
      
      initializeEventListeners() {
        // Submit do formulário
        this.form.addEventListener('submit', (e) => {
          e.preventDefault();
          this.handleLogin();
        });
        
        // Enter nos campos
        this.emailInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            this.passwordInput.focus();
          }
        });
        
        this.passwordInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            this.handleLogin();
          }
        });
      }
      
      async checkExistingSession() {
        console.log('🔍 LOGIN: Verificando sessão existente...');
        
        try {
          const result = await window.authManager.initialize();
          
          if (result.authenticated) {
            console.log('✅ LOGIN: Sessão existente encontrada, redirecionando...');
            this.showSuccess('Sessão recuperada com sucesso!');
            setTimeout(() => {
              window.location.href = 'index.html';
            }, 1000);
          }
        } catch (error) {
          console.error('❌ LOGIN: Erro ao verificar sessão:', error);
        }
      }
      
      async handleLogin() {
        const email = this.emailInput.value.trim();
        const password = this.passwordInput.value;
        
        // Validação básica
        if (!email || !password) {
          this.showError('Por favor, preencha todos os campos.');
          return;
        }
        
        if (!this.validateEmail(email)) {
          this.showError('Por favor, digite um email válido.');
          return;
        }
        
        this.setLoading(true);
        this.clearAlerts();
        
        try {
          console.log('🔐 LOGIN: Tentando autenticar usuário...');
          
          const result = await window.authManager.login(email, password);
          
          if (result.success) {
            console.log('✅ LOGIN: Autenticação bem-sucedida!');
            this.showSuccess('Login realizado com sucesso! Redirecionando...');
            
            setTimeout(() => {
              window.location.href = 'index.html';
            }, 1500);
          } else {
            console.error('❌ LOGIN: Falha na autenticação:', result.error);
            this.showError(result.error || 'Falha ao realizar login. Verifique suas credenciais.');
          }
        } catch (error) {
          console.error('❌ LOGIN: Erro inesperado:', error);
          this.showError('Ocorreu um erro inesperado. Tente novamente.');
        } finally {
          this.setLoading(false);
        }
      }
      
      validateEmail(email) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(email);
      }
      
      setLoading(loading) {
        if (loading) {
          this.btnLogin.classList.add('loading');
          this.btnLogin.disabled = true;
          this.btnText.textContent = '';
        } else {
          this.btnLogin.classList.remove('loading');
          this.btnLogin.disabled = false;
          this.btnText.textContent = 'Entrar';
        }
      }
      
      showError(message) {
        this.clearAlerts();
        const alertDiv = document.createElement('div');
        alertDiv.className = 'login-error';
        alertDiv.textContent = message;
        this.alertContainer.appendChild(alertDiv);
        
        // Auto-remover após 5 segundos
        setTimeout(() => {
          if (alertDiv.parentNode) {
            alertDiv.parentNode.removeChild(alertDiv);
          }
        }, 5000);
      }
      
      showSuccess(message) {
        this.clearAlerts();
        const alertDiv = document.createElement('div');
        alertDiv.className = 'login-success';
        alertDiv.textContent = message;
        this.alertContainer.appendChild(alertDiv);
        
        // Auto-remover após 3 segundos
        setTimeout(() => {
          if (alertDiv.parentNode) {
            alertDiv.parentNode.removeChild(alertDiv);
          }
        }, 3000);
      }
      
      clearAlerts() {
        this.alertContainer.innerHTML = '';
      }
    }
    
    // Inicializar quando o DOM estiver pronto
    document.addEventListener('DOMContentLoaded', () => {
      console.log('🚀 LOGIN: Página de login carregada');
      window.loginManager = new LoginManager();
    });
  </script>
</body>
</html>
