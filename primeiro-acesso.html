<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Primeiro Acesso - Agenda Beauty</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    .primeiro-acesso-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }
    
    .primeiro-acesso-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      padding: 40px;
      width: 100%;
      max-width: 450px;
      text-align: center;
    }
    
    .primeiro-acesso-header {
      margin-bottom: 30px;
    }
    
    .primeiro-acesso-header h1 {
      color: #333;
      font-size: 2rem;
      margin-bottom: 10px;
    }
    
    .primeiro-acesso-header p {
      color: #666;
      font-size: 1rem;
      line-height: 1.5;
    }
    
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: #333;
      font-weight: 500;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e1e5e9;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .password-requirements {
      margin-top: 10px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }
    
    .password-requirements h4 {
      color: #333;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }
    
    .password-requirements ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    
    .password-requirements li {
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 4px;
      padding-left: 20px;
      position: relative;
    }
    
    .password-requirements li::before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #667eea;
    }
    
    .btn-primary {
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .alert {
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: left;
    }
    
    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .alert-info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .user-info {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: left;
    }
    
    .user-info h3 {
      color: #333;
      font-size: 1rem;
      margin-bottom: 5px;
    }
    
    .user-info p {
      color: #666;
      font-size: 0.9rem;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="primeiro-acesso-container">
    <div class="primeiro-acesso-card">
      <div class="primeiro-acesso-header">
        <h1>🎉 Bem-vindo!</h1>
        <p>Você foi convidado para fazer parte do Agenda Beauty.<br>Crie sua senha para acessar o sistema.</p>
      </div>

      <!-- Alert Container -->
      <div id="alertContainer"></div>

      <!-- User Info -->
      <div id="userInfo" class="user-info" style="display: none;">
        <h3>Dados do Convite</h3>
        <p><strong>Email:</strong> <span id="userEmail"></span></p>
        <p><strong>Nome:</strong> <span id="userName"></span></p>
      </div>

      <!-- Form -->
      <form id="primeiroAcessoForm">
        <div class="form-group">
          <label for="senha">Nova Senha *</label>
          <input 
            type="password" 
            id="senha" 
            name="senha" 
            required 
            placeholder="Digite sua nova senha"
            minlength="6"
          >
        </div>

        <div class="form-group">
          <label for="confirmarSenha">Confirmar Senha *</label>
          <input 
            type="password" 
            id="confirmarSenha" 
            name="confirmarSenha" 
            required 
            placeholder="Confirme sua nova senha"
            minlength="6"
          >
        </div>

        <div class="password-requirements">
          <h4>Requisitos da Senha:</h4>
          <ul>
            <li>Mínimo de 6 caracteres</li>
            <li>Pelo menos uma letra</li>
            <li>Pelo menos um número</li>
            <li>Recomendado: caracteres especiais</li>
          </ul>
        </div>

        <button type="submit" class="btn-primary" id="btnCriarSenha">
          Criar Senha e Acessar
        </button>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  
  <script>
    // Primeiro Acesso Manager
    class PrimeiroAcessoManager {
      constructor() {
        this.supabase = window.supabase;
        this.accessToken = null;
        this.refreshToken = null;
        this.userData = null;
        this.init();
      }

      async init() {
        console.log('🔐 Inicializando Primeiro Acesso Manager...');
        
        // Capturar tokens da URL hash
        const hasValidTokens = this.captureTokensFromURL();
        
        // Se tiver tokens válidos, criar sessão
        if (hasValidTokens) {
          await this.createSessionFromTokens();
        } else {
          this.showAlert('error', 'Link de convite inválido ou expirado. Por favor, solicite um novo convite.');
          this.disableForm();
        }
      }

      captureTokensFromURL() {
        // Ler tokens da URL hash (formato #access_token=xxx&refresh_token=yyy&type=invite)
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        
        this.accessToken = hashParams.get('access_token');
        this.refreshToken = hashParams.get('refresh_token');
        this.type = hashParams.get('type');
        
        console.log('🔍 Tokens capturados da URL hash:', {
          hasAccessToken: !!this.accessToken,
          hasRefreshToken: !!this.refreshToken,
          type: this.type,
          hash: window.location.hash
        });
        
        // Verificar se é um convite válido
        if (this.type !== 'invite') {
          console.warn('⚠️ Tipo de token inválido:', this.type);
          this.showAlert('error', 'Link inválido. Este link não é um convite válido.');
          return false;
        }
        
        return !!(this.accessToken && this.refreshToken);
      }

      async createSessionFromTokens() {
        try {
          console.log('🔑 Criando sessão a partir dos tokens...');
          
          const { data, error } = await this.supabase.auth.setSession({
            access_token: this.accessToken,
            refresh_token: this.refreshToken
          });

          if (error) {
            console.error('❌ Erro ao criar sessão:', error);
            this.showAlert('error', 'Erro ao validar convite: ' + error.message);
            this.disableForm();
            return;
          }

          console.log('✅ Sessão criada com sucesso:', data);
          this.userData = data.user;
          
          // Exibir informações do usuário
          this.displayUserInfo();
          
          // Configurar formulário
          this.setupForm();
          
        } catch (error) {
          console.error('❌ Erro ao criar sessão:', error);
          this.showAlert('error', 'Erro ao processar convite. Por favor, tente novamente.');
          this.disableForm();
        }
      }

      displayUserInfo() {
        if (!this.userData) return;
        
        const userInfoDiv = document.getElementById('userInfo');
        const userEmailSpan = document.getElementById('userEmail');
        const userNameSpan = document.getElementById('userName');
        
        userEmailSpan.textContent = this.userData.email || 'Não disponível';
        userNameSpan.textContent = this.userData.user_metadata?.nome || 'Não informado';
        
        userInfoDiv.style.display = 'block';
        
        console.log('👤 Informações do usuário exibidas:', this.userData);
      }

      setupForm() {
        const form = document.getElementById('primeiroAcessoForm');
        const btnCriarSenha = document.getElementById('btnCriarSenha');
        
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          await this.handlePasswordCreation();
        });
        
        // Validação em tempo real
        const senhaInput = document.getElementById('senha');
        const confirmarInput = document.getElementById('confirmarSenha');
        
        confirmarInput.addEventListener('input', () => {
          if (confirmarInput.value && senhaInput.value !== confirmarInput.value) {
            confirmarInput.setCustomValidity('As senhas não coincidem');
          } else {
            confirmarInput.setCustomValidity('');
          }
        });
        
        console.log('📝 Formulário configurado');
      }

      async handlePasswordCreation() {
        const senha = document.getElementById('senha').value;
        const confirmarSenha = document.getElementById('confirmarSenha').value;
        const btnCriarSenha = document.getElementById('btnCriarSenha');
        
        // Validação
        if (senha !== confirmarSenha) {
          this.showAlert('error', 'As senhas não coincidem. Por favor, verifique.');
          return;
        }
        
        if (senha.length < 6) {
          this.showAlert('error', 'A senha deve ter pelo menos 6 caracteres.');
          return;
        }
        
        // Desabilitar botão e mostrar loading
        btnCriarSenha.disabled = true;
        btnCriarSenha.innerHTML = '<span class="loading-spinner"></span>Criando senha...';
        
        try {
          console.log('🔧 Atualizando senha do usuário...');
          
          const { data, error } = await this.supabase.auth.updateUser({
            password: senha
          });

          if (error) {
            console.error('❌ Erro ao atualizar senha:', error);
            this.showAlert('error', 'Erro ao criar senha: ' + error.message);
            return;
          }

          console.log('✅ Senha atualizada com sucesso:', data);
          
          // Marcar primeiro login como completado
          await this.markFirstLoginCompleted();
          
          // Sucesso
          this.showAlert('success', 'Senha criada com sucesso! Redirecionando para o login...');
          
          // Redirecionar após 2 segundos
          setTimeout(() => {
            window.location.href = 'login-profissional.html';
          }, 2000);
          
        } catch (error) {
          console.error('❌ Erro ao criar senha:', error);
          this.showAlert('error', 'Erro ao criar senha. Por favor, tente novamente.');
        } finally {
          // Reabilitar botão
          btnCriarSenha.disabled = false;
          btnCriarSenha.innerHTML = 'Criar Senha e Acessar';
        }
      }

      async markFirstLoginCompleted() {
        try {
          console.log('🔐 Marcando primeiro login como completado...');
          
          const { data, error } = await this.supabase.rpc('mark_first_login');

          if (error) {
            console.warn('⚠️ Erro ao marcar primeiro login:', error);
          } else {
            console.log('✅ Primeiro login marcado como completado');
          }
          
        } catch (error) {
          console.warn('⚠️ Erro ao marcar primeiro login:', error);
        }
      }

      showAlert(type, message) {
        const alertContainer = document.getElementById('alertContainer');
        const alertClass = type === 'success' ? 'alert-success' : 
                          type === 'error' ? 'alert-error' : 'alert-info';
        
        alertContainer.innerHTML = `
          <div class="alert ${alertClass}">
            ${message}
          </div>
        `;
        
        // Auto-remover após 5 segundos (exceto erros)
        if (type !== 'error') {
          setTimeout(() => {
            alertContainer.innerHTML = '';
          }, 5000);
        }
      }

      disableForm() {
        const form = document.getElementById('primeiroAcessoForm');
        const inputs = form.querySelectorAll('input, button');
        
        inputs.forEach(input => {
          input.disabled = true;
        });
        
        console.log('🔒 Formulário desabilitado');
      }
    }

    // Inicializar quando a página carregar
    document.addEventListener('DOMContentLoaded', () => {
      new PrimeiroAcessoManager();
    });
  </script>
</body>
</html>
