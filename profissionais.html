<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profissionais - Agenda Beauty</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>💇 Agenda Beauty</h2>
      <nav>
        <a href="index.html" class="nav-item">
          <span class="nav-icon">🏠</span>
          <span class="nav-text">Início</span>
        </a>
        <a href="agenda.html" class="nav-item">
          <span class="nav-icon">📅</span>
          <span class="nav-text">Agenda</span>
        </a>
        <a href="clientes.html" class="nav-item">
          <span class="nav-icon">👥</span>
          <span class="nav-text">Clientes</span>
        </a>
        <a href="servicos.html" class="nav-item">
          <span class="nav-icon">💇</span>
          <span class="nav-text">Serviços</span>
        </a>
        <a href="profissionais.html" class="nav-item active">
          <span class="nav-icon">👩</span>
          <span class="nav-text">Profissionais</span>
        </a>
      </nav>
    </aside>

    <main class="content">
      <div class="page-header">
        <h1>👩 Profissionais</h1>
        <div class="header-actions">
          <button id="btnAtualizar" class="btn btn-secondary">
            🔄 Atualizar
          </button>
          <button id="btnNovoProfissional" class="btn btn-primary">
            <span class="btn-icon">➕</span>
            Novo Profissional
          </button>
        </div>
      </div>

      <!-- Estatísticas -->
      <div class="stats-section">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon"> </div>
            <div class="stat-content">
              <div class="stat-value" id="totalProfissionais">0</div>
              <div class="stat-label">Total de Profissionais</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"> </div>
            <div class="stat-content">
              <div class="stat-value" id="agendamentosHoje">0</div>
              <div class="stat-label">Agendamentos Hoje</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"> </div>
            <div class="stat-content">
              <div class="stat-value" id="profissionalAtivo">-</div>
              <div class="stat-label">Mais Ativo</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Tabela de Profissionais -->
      <div class="table-container">
        <div class="table-header">
          <h2>Lista de Profissionais</h2>
          <div class="table-actions">
            <input type="text" id="buscaProfissional" class="form-control" placeholder="Buscar profissional...">
          </div>
        </div>
        <div class="table-wrapper">
          <table class="modern-table">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Telefone</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabelaProfissionais">
              <!-- Profissionais serão carregados aqui -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Botão de Logout -->
  <button id="logoutButton" class="btn btn-danger logout-btn">
    🚪 Sair
  </button>

  <!-- Modal de Profissional -->
  <div id="modalProfissional" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitulo">Novo Profissional</h3>
        <button type="button" id="btnFecharModal" class="btn-close">&times;</button>
      </div>

      <div class="modal-body">
        <div class="form-section">
          <div class="form-group">
            <label for="nomeProfissional">Nome do Profissional *</label>
            <input type="text" id="nomeProfissional" class="form-control" required placeholder="Nome completo">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="telefoneProfissional">WhatsApp</label>
              <input type="tel" id="telefoneProfissional" class="form-control" maxlength="15" placeholder="(DDD) 00000-0000">
            </div>
            <div class="form-group">
              <label for="emailProfissional">Email *</label>
              <input type="email" id="emailProfissional" class="form-control" required placeholder="email@exemplo.com">
            </div>
          </div>
      </div>

      <div class="modal-footer">
        <button type="button" id="btnExcluir" class="btn btn-danger" style="display: none;">
          <span class="btn-icon"> </span>
          Excluir
        </button>
        <button type="button" id="btnResetSenha" class="btn btn-warning" style="display: none;">
          <span class="btn-icon">🔑</span>
          Resetar Senha
        </button>
        <button type="button" id="btnSalvar" class="btn btn-primary">
          <span class="btn-icon">💾</span>
          Salvar
        </button>
      </div>

  <!-- Alert Container -->
  <div id="alertContainer" class="alert-container"></div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/authManager.js"></script>
  <script src="js/firstLoginManager.js"></script>
  <script src="js/dataManager.js"></script>
  <script src="js/pageManager.js"></script>
  <script src="js/menuManager.js"></script>
  <script src="js/profissionaisPage.js"></script>
  <script src="js/appInit.js"></script>
  
  <script>
    // Garantir que ProfissionaisPage esteja disponível globalmente
    if (typeof ProfissionaisPage !== 'undefined') {
      window.ProfissionaisPage = ProfissionaisPage;
      console.log('✅ ProfissionaisPage disponível globalmente');
    }
  </script>
  
  <script>
    // ✅ VERIFICAR SESSÃO ANTES DE INICIAR PÁGINA
    setTimeout(async () => {
      console.log('🔍 PROFISSIONAIS: Verificando sessão antes de inicializar...');
      
      // ✅ Usar AuthManager global protegido
      if (!window.authManager) {
        console.error('❌ PROFISSIONAIS: AuthManager não encontrado');
        return;
      }
      
      // ✅ Verificar sessão atual
      const session = await window.authManager.getCurrentSession();
      if (!session) {
        console.error('❌ PROFISSIONAIS: SEM SESSÃO - usuário não autenticado');
        window.location.href = 'login.html';
        return;
      }
      
      console.log('✅ PROFISSIONAIS: Sessão verificada, usuário:', session.user.email);
      
      // ✅ Verificar se appReady já foi disparado
      if (window.dataManager && window.dataManager.profissionais) {
        console.log('🚀 PROFISSIONAIS: appReady já foi disparado, inicializando diretamente...');
        window.profissionaisPage = new ProfissionaisPage();
        window.profissionaisPage.initializeSpecificPage();
      } else {
        console.log('⏳ PROFISSIONAIS: appReady ainda não foi disparado, registrando listener...');
        window.addEventListener('appReady', () => {
          console.log('🚀 PROFISSIONAIS: appReady recebido, inicializando página...');
          window.profissionaisPage = new ProfissionaisPage();
          window.profissionaisPage.initializeSpecificPage();
        });
      }
      
      // ✅ Configurar botão de logout
      const logoutBtn = document.getElementById('logoutButton');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', async () => {
          console.log('🚪 PROFISSIONAIS: Botão de logout clicado');
          
          try {
            if (window.authManager) {
              await window.authManager.logout();
              window.location.href = 'login.html';
            } else {
              const { error } = await window.supabase.auth.signOut();
              if (error) {
                console.error('❌ PROFISSIONAIS: Erro no logout:', error);
                alert('Erro ao sair: ' + error.message);
              } else {
                window.location.href = 'login.html';
              }
            }
          } catch (error) {
            console.error('❌ PROFISSIONAIS: Erro ao fazer logout:', error);
            alert('Erro ao sair: ' + error.message);
          }
        });
        
        console.log('✅ PROFISSIONAIS: Botão de logout configurado');
      }
    }, 200);
  </script>
</body>
</html>
