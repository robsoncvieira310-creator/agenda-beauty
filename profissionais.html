      <!-- Verificação de role para Empresas e Profissionais -->
      <script>
        (function() {
          function checkRoleAndHideMenuItems() {
            try {
              const authFSM = window.authFSM;
              if (!authFSM || !authFSM.getState) {
                console.log('[ROLE CHECK] authFSM não disponível - pulando verificação');
                return;
              }
              
              const state = authFSM.getState();
              const user = state?.session?.user;
              const role = user?.app_metadata?.role || user?.user_metadata?.role || user?.role;
              
              // Verificar Empresas (só admin)
              const empresasLink = document.getElementById('nav-empresas');
              if (empresasLink) {
                if (role === 'admin') {
                  empresasLink.style.display = '';
                  console.log('[ROLE CHECK] Admin - mostrando Empresas');
                } else {
                  empresasLink.style.display = 'none';
                  console.log('[ROLE CHECK] Não-admin - escondendo Empresas, role:', role);
                }
              }
              
              // Verificar Profissionais (admin e adm_empresa)
              const profissionaisLink = document.getElementById('nav-profissionais');
              if (profissionaisLink) {
                if (role === 'admin' || role === 'adm_empresa') {
                  profissionaisLink.style.display = '';
                  console.log('[ROLE CHECK] Admin/AdmEmpresa - mostrando Profissionais');
                } else {
                  profissionaisLink.style.display = 'none';
                  console.log('[ROLE CHECK] Profissional - escondendo Profissionais, role:', role);
                }
              }
            } catch (e) {
              console.log('[ROLE CHECK] Erro na verificação:', e.message);
            }
          }
          
          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', checkRoleAndHideMenuItems);
          } else {
            checkRoleAndHideMenuItems();
          }
        })();
      </script>

  <!-- 🎯 FASE 3.0.1.1: SidebarManager REMOVIDO (duplicado - já carregado antes do CompositionRoot) -->

  <!-- Bootstrap FSM UI + Carregamento de Página -->
  <script>
    // Usar window.* em vez de imports
    const bootstrapApp = window.bootstrapApp;
    const ProfissionaisPage = window.ProfissionaisPage;

    // GUARD DE INTEGRIDADE DO BOOTSTRAP
    window.__BOOTSTRAP_OK__ = false;
    window.__BOOTSTRAP_FAILED__ = false;
    window.__setBootstrapOk = () => { window.__BOOTSTRAP_OK__ = true; };

    // SAFE TRACE BOOTSTRAP (cross-page safe)
    try {
      if (typeof window.trace !== 'function') {
        window.trace = () => {};
      }
    } catch (e) {
      window.trace = () => {};
    }

    // 🔥 BOOTSTRAP PIPE - ADAPTER MODE (Read-Only - ZERO STATE)
    // Desacoplado: não controla mais o fluxo, apenas reflete estado do BootKernel
    window.__BOOTSTRAP_PIPE = (function() {
      // Mapeamento de estado do Kernel para formato legado do PIPE
      function mapKernelToPipeStage() {
        const kernel = window.__BOOT_KERNEL__ || window.__KERNEL__ || window.kernel;

        // Se kernel não existe, retornar estado seguro padrão
        if (!kernel) {
          console.warn('[PIPE ADAPTER] Kernel não disponível, retornando INIT');
          return { stage: 'INIT', flags: { managers: 'pending', auth: 'pending', pageManager: 'pending' } };
        }

        // Mapeamento de estados do Kernel para formato PIPE
        const state = kernel.state || 'IDLE';

        switch (state) {
          case 'READY':
            return {
              stage: 'READY',
              flags: { managers: 'ready', auth: 'ready', pageManager: 'ready' }
            };
          case 'RUNNING':
            // RUNNING mapeia para AUTH (estado intermediário)
            return {
              stage: 'AUTH',
              flags: { managers: 'ready', auth: 'ready', pageManager: 'pending' }
            };
          case 'IDLE':
          case 'FAILED':
          case 'DEGRADED':
          default:
            // Estados iniciais/falha mapeiam para INIT
            return {
              stage: 'INIT',
              flags: { managers: 'pending', auth: 'pending', pageManager: 'pending' }
            };
        }
      }

      return {
        getState() {
          const mapped = mapKernelToPipeStage();
          console.log('[PIPE STATE]', mapped.stage, '(via Kernel)');
          return mapped;
        },

        consume(event) {
          // PIPE desativado - uso ignorado silenciosamente
        },

        subscribe(observer) {
          // PIPE em modo adapter - não registra observers
          // Executa observer uma vez com estado atual para compatibilidade
          if (typeof observer === 'function') {
            try {
              const state = this.getState();
              observer(state, { type: 'ADAPTER_INIT' }, state);
            } catch (e) {
              console.error('[PIPE ADAPTER] Erro no observer:', e);
            }
          }

          // Retornar função de unsubscribe vazia
          return () => {
            console.log('[PIPE ADAPTER] Unsubscribe (noop)');
          };
        }
      };
    })();

    // Log inicial do estado
    window.__BOOTSTRAP_PIPE.subscribe((state) => {
      console.log('[BOOT] PIPE ADAPTER ATIVO - Stage:', state.stage);
    });

    // BOOTSTRAP RUNTIME STATE
    window.__BOOTSTRAP_RUNTIME__ = {
      trace: true,
      supabase: 'local-only',
      pageManagerContract: 'initializePage-only',
      cdnAllowed: false
    };

    // 🎯 VALIDAÇÃO REMOVIDA: __BOOTSTRAP_DEPS não é mais usado no modelo FSM atual
    // LogoutManager e SidebarManager são carregados como scripts independentes
    // e se conectam ao sistema automaticamente

    async function waitForAuthStable() {
      // 🔴 P0 CRITICAL: STATE-DRIVEN BOOT CONTRACT
      // Primeiro tenta ler estado persistido diretamente
      const kernel = window.__BOOT_KERNEL__;
      const directContext = kernel?.getReadyContext?.();
      
      if (directContext) {
        console.log('[BOOT] Context from kernel readyState (instant)');
        const { getAuthState } = directContext;
        const state = getAuthState();
        return { context: directContext, state };
      }

      // Fallback: bootstrap normal
      console.log('[BOOT] No persisted state, bootstrapping...');
      const context = await bootstrapApp();
      const { authFSM, getAuthState } = context;

      // Verificar estado inicial
      const initialState = getAuthState();
      if (initialState.state !== 'SESSION_RESTORING') {
        console.log('[BOOT] Auth state already stable:', initialState.state);
        return { context, state: initialState };
      }

      // Aguardar estado estável via subscribe (reativo, sem waitForStableAuth)
      return new Promise((resolve) => {
        let resolved = false;

        const checkState = () => {
          if (resolved) return;
          const state = getAuthState();
          if (state.state !== 'SESSION_RESTORING') {
            resolved = true;
            console.log('[BOOT] Auth state stable via subscribe:', state.state);
            resolve({ context, state });
          }
        };

        // Verificar imediatamente
        checkState();

        // Inscrever para mudanças até estado estável
        const handler = () => checkState();
        authFSM.subscribe?.(handler);

        // Timeout de segurança (5s)
        setTimeout(() => {
          if (!resolved) {
            resolved = true;
            console.warn('[BOOT] Timeout waiting for stable auth, returning current state');
            resolve({ context, state: getAuthState() });
          }
        }, 5000);
      });
    }

    // ================================
    // CHECKPOINT DE INTEGRIDADE
    // ================================
    // 🎯 CHECKPOINT SIMPLIFICADO: Apenas verificamos scripts carregados antes do boot.
    // BaseService, AuthFSM e services são criados DURANTE bootstrapApp().
    // A validação completa ocorre dentro de bootstrapProfissionais() após SYSTEM STABLE.
    (function () {
      if (!window.supabaseClient) throw new Error('supabaseClient missing');
      if (!window.EffectRunner) throw new Error('EffectRunner missing');
      if (!window.DataCore) throw new Error('DataCore missing');

      console.log('[BOOT CHECK] OK');
    })();

    async function bootstrapProfissionais() {
      console.log('[BOOT]', 'profissionais_bootstrap_start', Date.now());

      // CORRETO: Aguarda estado estável, não lança erro
      const { context, state } = await waitForAuthStable();
      console.log('[BOOT]', 'profissionais_auth_stable', state.status, Date.now());

      // GUARD EXPLÍCITO: UNAUTHENTICATED → redirecionar
      // FSM-only: state.state é a única fonte de verdade
      if (state.state === 'UNAUTHENTICATED') {
        console.log('[GUARD REDIRECT]', { reason: 'AUTH_REQUIRED', authState: state.state });
        window.location.href = 'login.html';
        return;
      }

      // 🎯 FASE 3: GUARD FIRST_LOGIN_REQUIRED → redirecionar para troca de senha
      if (state.state === 'FIRST_LOGIN_REQUIRED') {
        console.log('[GUARD REDIRECT]', { reason: 'FIRST_LOGIN_REQUIRED', authState: state.state });
        window.location.href = 'change-password.html';
        return;
      }

      // GUARD EXPLÍCITO: AUTHENTICATED → continuar
      // FSM-only: state.state é a única fonte de verdade
      if (state.state === 'AUTHENTICATED') {
        try {
          console.log('[BOOT]', 'profissionais_creating_pageManager', Date.now());
          window.pageManager = new ProfissionaisPage();
          window.profissionaisPage = window.pageManager;
          console.log('[BOOT]', 'profissionais_pageManager_created', Date.now());

          // 🎯 ATIVAÇÃO SIDEBAR (Opção A - Manual Controlada) - ANTES de initializePage
          // Garante que o botão apareça mesmo se a página falhar
          if (!window._sidebarManagerActivated &&
              window.SidebarManager &&
              document.getElementById('sidebar')) {
            try {
              const sidebarManager = new SidebarManager({ authFSM: window.authFSM });
              sidebarManager.activate();
              window._sidebarManagerActivated = true;
              console.log('[BOOT] SidebarManager ativado (modo legado)');
            } catch (e) {
              console.warn('[BOOT] SidebarManager ativação falhou:', e.message);
            }
          }

          // PIPE: Consome AUTH_READY event
          window.__BOOTSTRAP_PIPE.consume({ type: 'AUTH_READY' });
          console.log('[BOOT] AUTH READY');

          // PIPE: Consome PAGE_MANAGER_READY event
          window.__BOOTSTRAP_PIPE.consume({ type: 'PAGE_MANAGER_READY' });

          // PAGE MANAGER HARD CONTRACT
          if (!window.pageManager) {
            throw new Error('[BOOTSTRAP FATAL] PageManager missing');
          }
          if (typeof window.pageManager.init === 'function') {
            console.warn('[LEGACY CONTRACT DETECTED] init() ignored - migrating to initializePage');
          }
          if (typeof window.pageManager.initializePage !== 'function') {
            throw new Error('[BOOTSTRAP FATAL] initializePage missing');
          }
          console.log('[BOOT]', 'profissionais_calling_initializePage', Date.now());
          await window.pageManager.initializePage();
          console.log('[BOOT]', 'profissionais_initializePage_complete', Date.now());
          console.log('[PAGE MANAGER] initializePage contract OK');

          // VALIDAÇÃO FINAL OBRIGATÓRIA
          console.log('[BOOT] FINAL VALIDATION START');

          if (typeof window.pageManager.initializePage !== 'function') {
            throw new Error('[BOOTSTRAP FATAL] PageManager contract invalid');
          }

          // 🎯 NOTA: Não verificar window.supabase - o getter de supabaseClient.js
          // lança erro fatal ao acessar window.supabase. Apenas verificamos supabaseClient.
          if (!window.supabaseClient) {
            console.warn('[BOOT] supabaseClient não disponível');
          }

          // Marcar bootstrap como OK
          window.__setBootstrapOk();
          console.log('[BOOT]', 'profissionais_bootstrap_complete', Date.now());

          // 🎯 SIDEBAR JÁ ATIVADO após criação do pageManager (linha ~477)

          // 🎯 INICIALIZAR NavigationEffectRunner para navegação FSM-driven
          if (window.NavigationEffectRunner && window.authFSM) {
            const navRunner = new NavigationEffectRunner(window.authFSM);
            navRunner.init();
            window.navigationEffectRunner = navRunner;
            console.log('[BOOT] NavigationEffectRunner inicializado');
          }

          console.log('[BOOT] SYSTEM STABLE');

        } catch (err) {
          console.error('[PROFISSIONAIS BOOTSTRAP ERROR]', {
            error: err.message,
            stack: err.stack,
            timestamp: Date.now()
          });

          // UI Error: não redirecionar, apenas marcar falha
          const isUIError = err instanceof ReferenceError ||
                           err instanceof TypeError ||
                           err.message?.includes('undefined') ||
                           err.message?.includes('is not defined');

          if (isUIError) {
            window.__BOOTSTRAP_STATE__ = 'FAILED_UI';
            window.__BOOTSTRAP_FAILED__ = true;
            console.warn('[REDIRECT BLOCKED] UI error - NOT redirecting (user authenticated)');
            return;
          }

          // Outros erros: logar mas não redirecionar (já está autenticado)
          window.__BOOTSTRAP_FAILED__ = true;
          console.warn('[BOOTSTRAP FAILED] Error but user authenticated - staying on page');
        }

        return;
      }

      // Estado inesperado - isso não deve acontecer se FSM estiver correta
      console.error('[BOOTSTRAP FATAL] Unexpected auth state:', state.status);
      window.__BOOTSTRAP_FAILED__ = true;
    }

    // 🎯 CHECKPOINT REMOVIDO: Validação de dependências CRÍTICAS deve ocorrer
    // APÓS o bootstrap, não antes. authFSM e services são criados DURANTE bootstrapApp().
    // A validação final já existe dentro de bootstrapProfissionais() após SYSTEM STABLE.

    try {
      bootstrapProfissionais();
    } catch (fatalError) {
      console.error('[BOOTSTRAP EXCEPTION]', fatalError);
      window.__BOOTSTRAP_STATE__ = 'FAILED_UI';
      window.__BOOTSTRAP_FAILED__ = true;
      console.warn('[REDIRECT BLOCKED] Fatal exception');
    }
  </script>
